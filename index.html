    <title>ContactHub - Smart Contact Manager</title>

      <div class="container-fluid px-2">
        <div class="my-nav">
          <div class="navbar-brand" href="#">

            </div>
            <div class="icon-img">

                src="./assets/images/imgi_1_avatar-4.png"

            </div>
          </div>

            </div>
            <div class="col-6 col-sm-6 col-md-4 col-lg-4 my-2">

                </div>
                <div class="content-right-side">
                  <p class="text-uppercase">Favorites</p>
                  <h3 id="total-contact">5</h3>
                </div>

            </div>
            <div class="col-6 col-sm-6 col-md-4 col-lg-4 my-2">
              <div class="content">

                  <i class="fa-solid fa-heart-pulse"></i>
                </div>
                <div class="content-right-side">
                  <p class="text-uppercase">Emergancy</p>
                  <h3 id="total-contact">5</h3>
                </div>
              </div>
            </div>
          </div>
          <h1 class="fs-1">All Contacts</h1>
          <p>
            Manage and organize your <span id="totalContact">0</span> contacts
          </p>
        </div>
      </section>
      <!-- ========== End quick-stats ========== -->

      <section class="search-section my-4">
        <div class="container-fluid">
          <div class="search-wrapper w-100 mx-auto">
            <input

              class="form-control custom-search-input"
              id="search"
              placeholder="Search by name, phone, or email..."
            />
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
          </div>
        </div>
      </section>
